backend:
  name: github
  repo: JakeTurner616/LucContractingWeb
  branch: main
  base_url: https://luc-contracting-auth.jake-3c8.workers.dev
  auth_endpoint: /auth

local_backend:
  url: http://localhost:8081/api/v1

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: pages
    label: Pages
    files:
      - name: metadata
        label: Metadata
        file: src/content/site/metadata.md
        fields:
          - { name: title, label: Browser Title, widget: string }
          - { name: description, label: Meta Description, widget: text, required: false }
          - { name: canonical_path, label: Canonical Path, widget: string, default: "/" }
          - { name: social_title, label: Social Share Title, widget: string, required: false }
          - { name: social_description, label: Social Share Description, widget: text, required: false }
          - { name: social_image, label: Social Share Image, widget: image, required: false }
      - name: home
        label: Home Page
        file: src/content/pages/home.md
        fields:
          - { name: hero_heading, label: Hero Heading, widget: string }
          - { name: hero_text, label: Hero Text, widget: text }
          - { name: hero_eyebrow, label: Hero Eyebrow, widget: string, required: false, default: Irrigation contracting }
          - { name: hero_image, label: Hero Image, widget: image, required: false, default: /uploads/hero-construction.jpg }
          - { name: hero_scope_label, label: Hero Image Caption Label, widget: string, required: false, default: "What We Handle:" }
          - { name: hero_scope_text, label: Hero Image Caption Text, widget: text, required: false, default: Careful diagnostics, practical repairs, and seasonal maintenance. }
          - { name: phone, label: Phone Number, widget: string }
          - { name: email, label: Email, widget: string, required: false }
          - { name: service_area, label: Service Area, widget: string, required: false }
          - { name: cta_label, label: Button Label, widget: string, required: false }
          - { name: intro_heading, label: About Section Heading, widget: string }
          - { name: services_eyebrow, label: Services Eyebrow, widget: string }
          - { name: services_heading, label: Services Section Heading, widget: string }
          - { name: projects_eyebrow, label: Projects Eyebrow, widget: string }
          - { name: projects_heading, label: Projects Section Heading, widget: string }
          - label: Contact Section
            name: contact
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: phone, label: Phone Number, widget: string, required: false }
              - { name: email, label: Email, widget: string, required: false }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { name: service_area, label: Service Area Text, widget: string, required: false, default: Serving the Greater Denver Metropolitan Area }
              - label: Footer Highlights
                name: highlights
                widget: list
                required: false
                field: { name: item, label: Highlight, widget: string }
              - { name: legal, label: Legal Text, widget: string, required: false, default: All rights reserved. }
          - { name: body, label: About Copy, widget: markdown }

  - name: services
    label: Irrigation Services
    folder: src/content/services
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Service Name, widget: string }
      - { name: summary, label: Service Summary, widget: text }
      - { name: order, label: Display Order, widget: number, required: false, value_type: int }
      - { name: body, label: Details, widget: markdown }

  - name: projects
    label: Recent Irrigation Work
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Project Name, widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - { name: image, label: Project Image, widget: image, required: false }
      - { name: summary, label: Project Summary, widget: text, required: false }
      - { name: order, label: Display Order, widget: number, required: false, value_type: int }
      - { name: body, label: Project Details, widget: markdown }
